<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下载器</title>
<style>
:root{
  --bg:#0e1014; --panel:#161a22; --panel2:#1c212b; --border:#282e3a;
  --text:#e6e8eb; --muted:#8b93a4; --accent:#4f9dff; --accent2:#34c759;
  --warn:#ffb020; --danger:#ff5c5c; --hover:#222734;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}
.wrap{max-width:920px;margin:0 auto;padding:24px 18px 60px}
header{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.logo{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,#4f9dff,#7b61ff);
  display:flex;align-items:center;justify-content:center;font-size:19px}
header h1{font-size:19px;font-weight:600;margin:0}
.sub{color:var(--muted);font-size:13px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--border);
  color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;outline:none}
input[type=text]:focus{border-color:var(--accent)}
.btn{border:1px solid var(--border);background:var(--panel2);color:var(--text);
  padding:9px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;
  display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn:hover{background:var(--hover)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#3d8bed}
.btn.go{background:var(--accent2);border-color:var(--accent2);color:#04150a}
.btn.warn{background:var(--warn);border-color:var(--warn);color:#2a1a00}
.btn.danger{border-color:var(--border);background:var(--panel2);color:var(--danger)}
.btn.danger:hover{background:rgba(255,92,92,.12)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.label{font-size:12px;color:var(--muted);min-width:90px}
.badge{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--panel2);
  border:1px solid var(--border);color:var(--accent)}
.badge.torrent{color:#c9a3ff}.badge.torrent_file{color:#c9a3ff}.badge.torrent_url{color:#c9a3ff}.badge.http{color:#4f9dff}.badge.ftp{color:#34c759}.badge.ed2k{color:#ffb020}
.badge.unsup{color:var(--warn)}
.badge.m3u8{color:#c9a3ff}
.badge.direct{color:#c9a3ff}
.badge.yt_media{color:#ff5c5c}
.badge.bilibili{color:#00a1d6}
.badge.weibo{color:#ff5722}
.badge.douyin{color:#ccc}
.badge.tiktok{color:#fe2c55}
.badge.facebook{color:#1877f2}
.badge.spotify{color:#1db954}
.badge.netease{color:#c20c0c}
.badge.kuaishou{color:#ff4906}
.badge.xiaohongshu{color:#fe2c55}
.badge.ixigua{color:#ff6633}
.badge.mgtv{color:#ff6d00}
.badge.tencent{color:#12b7f5}
/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;
  border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab .count{background:var(--panel2);border:1px solid var(--border);padding:1px 7px;
  border-radius:10px;font-size:11px;margin-left:5px}
/* settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.setting label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.setting input{padding:8px 10px}
.hint{font-size:12px;color:var(--muted);margin-top:8px}
/* task */
.task{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:10px}
.task .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.task .name{flex:1;min-width:0;font-weight:500;font-size:13px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.task .meta{display:flex;gap:10px;align-items:center;font-size:12px;color:var(--muted);margin-top:7px;flex-wrap:wrap}
.bar{height:6px;background:#1a1e28;border-radius:4px;overflow:hidden;margin-top:9px}
.bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}
.state-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block}
.state-dot.downloading,.state-dot.fetching{background:var(--accent);animation:pulse 1.2s infinite}
.state-dot.paused{background:var(--warn)}.state-dot.finished{background:var(--accent2)}
.state-dot.error{background:var(--danger)}.state-dot.queued{background:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.files{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.file-row{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:12px}
.file-row .fname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.file-row .fmeta{color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
.file-row .fbar{width:70px;height:4px;background:#1a1e28;border-radius:3px;overflow:hidden}
.file-row .fbar > i{display:block;height:100%;background:var(--accent)}
.files-toggle{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);cursor:pointer;user-select:none;padding:4px 0;margin-top:4px}
.files-toggle:hover{opacity:.8}
.files-toggle .arrow{transition:transform .2s;display:inline-block}
.files-toggle.open .arrow{transform:rotate(90deg)}
.file-list-wrap{display:none;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.file-list-wrap.open{display:block}
.check{appearance:none;width:18px;height:18px;border:2px solid var(--border);border-radius:5px;
  cursor:pointer;flex-shrink:0;position:relative;background:var(--panel);transition:.15s}
.check:checked{background:var(--accent);border-color:var(--accent)}
.check:checked::after{content:"";position:absolute;left:4px;width:6px;height:11px;
  border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);top:1px}
.empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}
.clear-bar{padding:8px 0;display:flex;gap:6px;flex-wrap:wrap}
code.dir{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#8ab4ff;word-break:break-all}
.rec{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--panel2);
  border:1px solid var(--border);border-radius:9px;margin-bottom:8px}
.rec .info{flex:1;min-width:0}
.rec .rname{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec .rsub{font-size:11px;color:var(--muted);margin-top:2px}
.pill{font-variant-numeric:tabular-nums;font-size:11px;color:var(--muted)}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;padding-top:28px;pointer-events:none;z-index:200}
.modal-overlay:nth-child(2){padding-top:48px}
.modal-overlay:nth-child(3){padding-top:68px}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:680px;max-width:94vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5);pointer-events:auto}
.modal-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:grab;user-select:none}
.modal-head:active{cursor:grabbing}
.modal-head h3{margin:0;font-size:15px;flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-body{padding:0 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column}
.modal-foot{border-top:1px solid var(--border);padding:0}
.drag-handle{cursor:grab}
.drag-handle:active{cursor:grabbing}
/* file picker */
.picker-toolbar{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.picker-filter{display:flex;gap:2px;flex-wrap:wrap}
.picker-filter .ftab{padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--muted);background:transparent;border:1px solid transparent;transition:.15s;user-select:none}
.picker-filter .ftab:hover{color:var(--text);background:var(--hover)}
.picker-filter .ftab.active{color:var(--accent);background:rgba(79,157,255,.1);border-color:var(--accent)}
.picker-list{flex:1;overflow-y:auto;min-height:140px;max-height:340px}
.pick-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--border);font-size:13px;transition:background .1s}
.pick-row:hover{background:var(--hover)}
.pick-row:last-child{border-bottom:none}
.pick-row .fname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pick-row .fsize{color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums;font-size:12px;min-width:70px;text-align:right}
.pick-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pick-icon.video{background:rgba(255,92,92,.15);color:#ff5c5c}
.pick-icon.audio{background:rgba(255,176,32,.15);color:#ffb020}
.pick-icon.image{background:rgba(52,199,89,.15);color:#34c759}
.pick-icon.doc{background:rgba(79,157,255,.15);color:#4f9dff}
.pick-icon.folder{background:rgba(201,163,255,.15);color:#c9a3ff}
.pick-icon.other{background:rgba(139,147,164,.15);color:#8b93a4}
.picker-summary{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);font-size:13px;flex-wrap:wrap;gap:8px}
.picker-summary .sel-info{color:var(--text);font-weight:500}
.picker-summary .disk-info{color:var(--muted);font-size:12px}
.picker-save{display:flex;align-items:center;gap:10px;padding:10px 0;font-size:13px;border-top:1px solid var(--border)}
.picker-save label{color:var(--muted);white-space:nowrap;font-size:12px}
.picker-save .dir-display{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#8ab4ff;background:var(--panel2);padding:6px 10px;border-radius:6px;border:1px solid var(--border)}
.picker-actions{display:flex;gap:10px;justify-content:flex-end;padding:14px 0}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.info-text{color:var(--muted);font-size:13px;text-align:center;padding:40px 10px}
/* 右键菜单 */
.ctx-menu{position:fixed;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:130px;z-index:2147483647;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.ctx-item{padding:8px 14px;cursor:pointer;border-radius:6px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;transition:background .1s;user-select:none}
.ctx-item:hover{background:var(--hover)}
.ctx-sep{height:1px;background:var(--border);margin:4px 8px}

/* Floating preview cards */
.yt-float-stack{position:fixed;bottom:16px;right:16px;z-index:9000;display:flex;flex-direction:column-reverse;gap:8px;max-height:calc(100vh - 120px);overflow-y:auto;padding:2px}
.yt-float-card{width:360px;background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3);padding:12px;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.yt-float-card .fmt-btns{display:flex;flex-wrap:wrap;gap:3px;max-height:60px;overflow-y:auto;margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">⬇</div>
    <div><h1>OpenXiaZai</h1><div class="sub">magnet · torrent · HTTP · FTP · ed2k · 种子文件 · YouTube · X · B站 · 微博 · 抖音 · TikTok · Facebook · Spotify</div></div>
    <div style="flex:1"></div>
    <button class="btn sm" id="settingsBtn" title="设置" style="font-size:22px;padding:4px 8px">⚙</button>
  </header>

  <div class="card">
    <div class="row">
      <div style="position:relative;flex:1">
        <input type="text" id="url" placeholder="粘贴链接：magnet:、http(s)://、ftp://、ed2k://、YouTube、X/Twitter、B站、微博、抖音、TikTok、Facebook、Spotify、种子文件路径…" style="flex:1;padding-right:28px">
        <button id="clearUrlBtn" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 6px;display:none;line-height:1" title="清空">✕</button>
      </div>
      <button class="btn sm" id="menuBtn" title="更多操作">⋮</button>
      <button class="btn primary" id="addBtn">添加下载</button>
    </div>
    <div id="typeHint" class="hint" style="display:none"></div>
  </div>

  <!-- 视频提取预览卡片 -->
  <div class="card" id="cxPreview" style="display:none">
    <div class="row" style="align-items:flex-start">
      <img id="cxPoster" style="width:80px;height:110px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--panel2)" alt="">
      <div style="flex:1;min-width:0">
        <div id="cxTitle" style="font-weight:600;font-size:15px;margin-bottom:6px"></div>
        <div id="cxMagnet" style="font-size:11px;color:var(--muted);word-break:break-all;margin-bottom:4px;display:none"></div>
        <div id="cxM3u8" style="font-size:11px;color:var(--accent);word-break:break-all"></div>
      </div>
    </div>
    <div class="row" style="margin-top:12px;gap:8px">
      <button class="btn go" id="cxDownload">立即下载</button>
      <button class="btn" id="cxQueue">加入队列</button>
      <button class="btn" id="cxCancel">取消</button>
    </div>
  </div>

  <!-- YouTube/X 视频预览卡片 -->
  <div class="card" id="ytPreview" style="display:none!important">
    <div class="row" style="align-items:flex-start">
      <img id="ytPoster" style="width:160px;height:90px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--panel2)" alt="">
      <div style="flex:1;min-width:0;padding-left:8px">
        <div id="ytTitle" style="font-weight:600;font-size:15px;margin-bottom:4px"></div>
        <div id="ytMeta" style="font-size:12px;color:var(--muted);margin-bottom:4px"></div>
        <div id="ytDesc" style="font-size:12px;color:var(--muted);max-height:40px;overflow:hidden;text-overflow:ellipsis"></div>
      </div>
    </div>
    <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">选择画质：</div>
      <div id="ytFormats" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>
    </div>
    <div class="row" style="margin-top:10px;gap:8px">
      <button class="btn go" id="ytDownload">立即下载</button>
      <button class="btn" id="ytAudioOnly">仅下载音频</button>
      <button class="btn" id="ytCancel">取消</button>
    </div>
  </div>

  <!-- B站视频预览卡片 -->
  <div class="card" id="biliPreview" style="display:none">
    <div class="row" style="align-items:flex-start">
      <img id="biliPoster" style="width:160px;height:90px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--panel2)" alt="">
      <div style="flex:1;min-width:0;padding-left:8px">
        <div id="biliTitle" style="font-weight:600;font-size:15px;margin-bottom:4px"></div>
        <div id="biliMeta" style="font-size:12px;color:var(--muted);margin-bottom:4px"></div>
        <div id="biliDesc" style="font-size:12px;color:var(--muted);max-height:40px;overflow:hidden;text-overflow:ellipsis"></div>
      </div>
    </div>
    <!-- 分P选择（多页视频） -->
    <div id="biliPageSelect" style="margin-top:8px;display:none">
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">选择分P：</div>
      <div id="biliPages" style="display:flex;flex-wrap:wrap;gap:4px"></div>
    </div>
    <!-- 画质选择 -->
    <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">选择画质：</div>
      <div id="biliFormats" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px"></div>
    </div>
    <!-- 音频画质选择 -->
    <div id="biliAudioSection" style="display:none;margin-bottom:6px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">音频质量：</div>
      <div id="biliAudioFormats" style="display:flex;flex-wrap:wrap;gap:4px"></div>
    </div>
    <!-- 未登录提示 -->
    <div id="biliNoLogin" style="display:none;font-size:12px;color:var(--muted);margin-top:6px">
      💡 已可选720P直链（无需登录）。扫码登录可获取1080P+画质。
    </div>
    <!-- 登录状态 -->
    <div id="biliLoggedIn" style="display:none;font-size:12px;color:var(--accent2);margin-top:6px"></div>
    <div class="row" style="margin-top:10px;gap:8px">
      <button class="btn go" id="biliDownload">立即下载</button>
      <button class="btn" id="biliAudioOnly">仅下载音频</button>
      <button class="btn" id="biliLoginBtn">扫码登录</button>
      <button class="btn" id="biliLogoutBtn" style="display:none;color:var(--danger)">退出登录</button>
      <button class="btn" id="biliCancel">取消</button>
    </div>
  </div>

  <!-- B站扫码登录弹窗 -->
  <div class="modal-overlay" id="biliQrOverlay" style="display:none">
    <div class="modal" style="width:400px">
      <div class="modal-head"><h3>扫码登录B站</h3></div>
      <div class="modal-body" style="padding:20px;text-align:center">
        <div id="biliQrImage" style="margin-bottom:12px;display:flex;justify-content:center">
          <img id="biliQrImg" style="width:200px;height:200px;border-radius:8px;border:1px solid var(--border)" alt="二维码">
        </div>
        <div id="biliQrStatus" style="font-size:14px;color:var(--text);margin-bottom:8px">
          请打开B站APP扫描二维码登录
        </div>
        <div style="font-size:12px;color:var(--muted)">
          登录后可获取1080P及以上画质视频
        </div>
      </div>
      <div class="modal-foot" style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end">
        <button class="btn" id="biliQrRefresh">刷新二维码</button>
        <button class="btn" id="biliQrClose">关闭</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="tasks">下载任务<span class="count" id="cTasks">0</span></div>
    <div class="tab" data-tab="history">下载记录<span class="count" id="cHist">0</span></div>
    <div class="tab" data-tab="trash">回收站<span class="count" id="cTrash">0</span></div>
  </div>

  <div id="pane-tasks"></div>
  <div id="pane-history" style="display:none"></div>
  <div id="pane-trash" style="display:none"></div>
  <div class="clear-bar" id="clearTasks" style="display:none">
    <button class="btn sm go" id="resumeAllBtn">全部开始</button>
    <button class="btn sm warn" id="pauseAllBtn">全部暂停</button>
    <button class="btn sm danger" id="deleteAllBtn">全部删除</button>
  </div>
  <div class="clear-bar" id="clearHist" style="display:none"><button class="btn sm danger" id="clearHistBtn">移至回收站</button></div>
  <div class="clear-bar" id="clearTrash" style="display:none"><button class="btn sm danger" id="clearTrashBtn">清空回收站</button><button class="btn sm danger" id="clearTrashFilesBtn" style="margin-left:6px">清空回收站并删除文件</button></div>
</div>
<div id="modalContainer" style="position:fixed;inset:0;pointer-events:none;z-index:300"></div>
<!-- template for file picker modals -->
<template id="modalTemplate">
<div class="modal-overlay">
  <div class="modal" style="width:680px;max-width:94vw;max-height:85vh"><div class="modal-head drag-handle"><h3 class="modal-title"></h3><span class="pill modal-size"></span></div><div class="modal-body"></div><div class="modal-foot"></div></div>
</div>
</template>

<div class="modal-overlay" id="confirmOverlay" style="display:none">
  <div class="modal" style="width:420px">

<script>
const $=id=>document.getElementById(id);
const TYPES={torrent:"种子/磁力",torrent_file:"本地种子文件",torrent_url:"远程种子文件",http:"HTTP 直链",ftp:"FTP",ed2k:"电驴→种子",quark:"夸克网盘",cloud:"网盘",thunder:"迅雷",m3u8:"M3U8流媒体",direct:"视频直链",yt_media:"YouTube 视频",bilibili:"B站视频",weibo:"微博视频",douyin:"抖音视频",tiktok:"TikTok 视频",facebook:"Facebook 视频",spotify:"Spotify 音乐",netease:"网易音乐",kuaishou:"快手视频",xiaohongshu:"小红书",ixigua:"西瓜视频",mgtv:"芒果TV",tencent:"腾讯视频"};
const UNSUP={quark:1,cloud:1,thunder:1};
let activeTab='tasks';
let cur=null;
const openFiles=new Set();  // track which task file lists are expanded
const fmtB=b=>{if(!b)return '0 B';const u=['B','KB','MB','GB','TB'];let i=0,v=b;while(v>=1024&&i<u.length-1){v/=1024;i++}return v.toFixed(i?1:0)+' '+u[i]};
const fmtR=b=>'↓ '+(b>0?fmtB(b)+'/s':'--');
const fmtTime=s=>{if(s<60)return s+'秒';if(s<3600)return Math.floor(s/60)+'分'+Math.round(s%60)+'秒';const h=Math.floor(s/3600),m=Math.round((s%3600)/60);return h+'时'+m+'分'};
const fmtETA=(pct,elapsed)=>{if(pct<=0||pct>=100)return'';const total=elapsed/pct*100;const remain=Math.max(0,total-elapsed);if(remain<60)return remain.toFixed(0)+'秒';if(remain<3600)return Math.floor(remain/60)+'分'+Math.round(remain%60)+'秒';const h=Math.floor(remain/3600),m=Math.round((remain%3600)/60);return h+'时'+m+'分'};
async function post(u,b){try{const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json()}catch(e){console.error('POST '+u+' failed:',e);return{ok:false,error:'请求失败: '+e.message}}}
function esc(s){return (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}


// in-app confirm/alert dialogs (avoids native OS dialog with Python icon)
function customConfirm(message, opts){
  opts=opts||{};
  return new Promise(resolve=>{
    $('confirmMsg').textContent=message;
    $('confirmTitle').textContent=opts.title||'确认操作';
    const okBtn=$('confirmOk'),noBtn=$('confirmNo');
    okBtn.textContent=opts.okText||'确定';
    noBtn.textContent=opts.cancelText||'取消';
    okBtn.className=opts.danger?'btn danger':'btn primary';
    noBtn.style.display='';
    $('confirmOverlay').style.display='flex';
    okBtn.onclick=()=>{$('confirmOverlay').style.display='none';resolve(true)};
    noBtn.onclick=()=>{$('confirmOverlay').style.display='none';resolve(false)};
  });
}
function customAlert(message, opts){
  opts=opts||{};
  return new Promise(resolve=>{
    $('confirmMsg').textContent=message;
    $('confirmTitle').textContent=opts.title||'提示';
    const okBtn=$('confirmOk'),noBtn=$('confirmNo');
    okBtn.textContent=opts.okText||'确定';
    okBtn.className='btn primary';
    noBtn.style.display='none';
    $('confirmOverlay').style.display='flex';
    okBtn.onclick=()=>{$('confirmOverlay').style.display='none';resolve(true)};
  });
}


// live link-type detection
$('url').addEventListener('input',()=>{
  const v=$('url').value.trim().toLowerCase();
  const h=$('typeHint');
  if(!v){h.style.display='none';return}
  let t='http';
  if(v.startsWith('magnet:'))t='torrent';
  else if(!v.startsWith('http')&&!v.startsWith('ftp')&&!v.startsWith('magnet')&&!v.startsWith('ed2k')&&!v.startsWith('thunder')&&v.endsWith('.torrent'))t='torrent_file';
  else if(v.startsWith('http')&&v.split('?')[0].split('#')[0].endsWith('.torrent'))t='torrent_url';
  else if(v.startsWith('ftp')||v.startsWith('sftp'))t='ftp';
  else if(v.startsWith('ed2k'))t='ed2k';
  else if(v.includes('quark.cn'))t='quark';
  else if(v.startsWith('thunder'))t='thunder';
  else if(/\.m3u8($|\?)/.test(v))t='m3u8';
  else if(/\.(mp4|mkv|avi|mov|flv|webm|ts|m4v|wmv)($|\?)/.test(v))t='direct';
  else if(/https?:\/\/(www\.)?(youtube\.com|youtu\.be)\//.test(v))t='yt_media';
  else if(/https?:\/\/(www\.)?(x\.com|twitter\.com|t\.co)\//.test(v))t='yt_media';
  else if(/https?:\/\/(www\.)?bilibili\.com\/(video|bangumi)\//.test(v))t='bilibili';
  else if(/https?:\/\/b23\.tv\//.test(v))t='bilibili';
  else if(/https?:\/\/(www\.)?(weibo\.com|weibo\.cn|video\.weibo\.com|m\.weibo\.cn|share\.api\.weibo\.cn)\//.test(v))t='weibo';
  else if(/https?:\/\/t\.cn\//.test(v))t='weibo';
  else if(/https?:\/\/(www\.)?(douyin\.com|v\.douyin\.com|iesdouyin\.com)\//.test(v))t='douyin';
  else if(/https?:\/\/(www\.)?(tiktok\.com|vm\.tiktok\.com|vt\.tiktok\.com)\//.test(v))t='tiktok';
  else if(/https?:\/\/(www\.)?facebook\.com\//.test(v)&&(/\/video/.test(v)||/\/watch/.test(v)||/\/reel/.test(v)||/\/posts/.test(v)||/\/permalink/.test(v)))t='facebook';
  else if(/https?:\/\/open\.spotify\.com\/(track|album|playlist|episode|show)\//.test(v))t='spotify';
  else if(/https?:\/\/music\.163\.com\/#\/(song|album|playlist|dj|mv)/.test(v))t='netease';
  else if(/https?:\/\/(www\.)?(kuaishou\.com|gif\.kuaishou\.com|v\.kuaishou\.com)\//.test(v))t='kuaishou';
  else if(/https?:\/\/(www\.)?(xiaohongshu\.com|xhslink\.com)\//.test(v))t='xiaohongshu';
  else if(/https?:\/\/(www\.)?ixigua\.com\//.test(v))t='ixigua';
  else if(/https?:\/\/(www\.|m\.)?mgtv\.com\//.test(v))t='mgtv';
  else if(/https?:\/\/(www\.|m\.)?iqiyi\.com\//.test(v))t='iqiyi';
  else if(/https?:\/\/(www\.|m\.)?(v\.qq\.com|film\.qq\.com)\//.test(v))t='tencent';
  else if(v.startsWith('http'))t='http';
  h.style.display='block';
  const YT_TYPES=['yt_media','weibo','douyin','tiktok','facebook','spotify','netease','kuaishou','xiaohongshu','ixigua','mgtv','tencent'];
  h.innerHTML='识别为 <span class="badge '+(UNSUP[t]?'unsup':t)+'">'+TYPES[t]+'</span>'+(UNSUP[t]?' · 暂不支持直接下载':'')+(t==='ed2k'?' · 将搜索种子源':'')+(YT_TYPES.includes(t)?' · 将使用 yt-dlp 下载':'')+(t==='bilibili'?' · 将使用B站API解析':'');
});

// 判断 URL 是否为直接文件下载（不走视频提取）
// 只保留二进制/压缩格式；文本/网页类（html/json/txt等）统一走解析流程
function isDirectFileDownload(url){
  const dlExts=['.zip','.rar','.7z','.tar.gz','.tar.bz2','.tar.xz','.gz','.bz2',
    '.pdf','.dmg','.iso','.exe','.apk','.ipa','.deb','.rpm',
    '.doc','.docx','.xls','.xlsx','.ppt','.pptx',
    '.jpg','.jpeg','.png','.gif','.webp','.svg','.ico',
    '.mp3','.flac','.wav','.aac','.ogg','.wma','.m4a',
    '.torrent'];
  const ext=url.toLowerCase().split('?')[0].split('#')[0];
  return dlExts.some(e=>ext.endsWith(e));
}

$('addBtn').onclick=async()=>{
  const url=$('url').value.trim();
  if(!url){return}

  const v=url.toLowerCase();

  // 不支持的类型：提前拦截，给出明确提示
  if(v.includes('quark.cn')){
    await customAlert('夸克网盘链接需要先在浏览器中转存到自己的网盘，再获取直链下载。',{title:'暂不支持夸克网盘'});
    return;
  }
  if(v.startsWith('thunder')){
    await customAlert('迅雷链接请用迅雷客户端下载，或转换为磁力/直链后使用。',{title:'暂不支持迅雷'});
    return;
  }

  // 本地种子文件路径（/path/to/file.torrent 或 ~/path/file.torrent）
  if(!v.startsWith('http')&&!v.startsWith('ftp')&&!v.startsWith('magnet')&&!v.startsWith('ed2k')&&!v.startsWith('thunder')&&v.endsWith('.torrent')){
    $('addBtn').disabled=true;$('addBtn').textContent='添加种子…';
    try{
      const res=await post('/api/add',{url});
      if(!res||res.ok===false){await customAlert(res?.error||'添加失败，请检查种子文件路径');$('addBtn').disabled=false;$('addBtn').textContent='添加下载';return}
      $('url').value='';$('typeHint').style.display='none';
      if(res.type==='torrent'){
        showFileModal(res.gid);
      } else {
        switchTab('tasks');
      }
    }catch(e){
      await customAlert('添加失败: '+e.message);
    }
    $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
    return;
  }

  // 远程种子文件 URL（http(s)://.../*.torrent）
  if(v.startsWith('http')&&v.split('?')[0].split('#')[0].endsWith('.torrent')){
    $('addBtn').disabled=true;$('addBtn').textContent='下载种子…';
    try{
      const res=await post('/api/add',{url});
      if(!res||res.ok===false){await customAlert(res?.error||'获取远程种子文件失败');$('addBtn').disabled=false;$('addBtn').textContent='添加下载';return}
      $('url').value='';$('typeHint').style.display='none';
      if(res.type==='torrent'){
        showFileModal(res.gid);
      } else {
        switchTab('tasks');
      }
    }catch(e){
      await customAlert('添加失败: '+e.message);
    }
    $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
    return;
  }

  // YouTube/X 视频链接：使用 yt-dlp 提取格式列表
  if(/https?:\/\/(www\.)?(youtube\.com|youtu\.be|x\.com|twitter\.com|t\.co)\//.test(v)){
    $('addBtn').disabled=true;$('addBtn').textContent='获取视频信息…';
    try{
      const res=await post('/api/yt_info',{url});
      if(!res||res.ok===false){
        const errMsg=res?.error||'获取视频信息失败';
        const hint=res?.hint||'';
        await customAlert(errMsg+(hint?'\n\n'+hint:''),{title:'获取失败'});
        $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
        return;
      }
      showYtPreview(res);
    }catch(e){await customAlert('获取视频信息失败: '+e.message)}
    $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
    return;
  }

  // 快手/抖音专用：使用 /api/add 走平台专用解析器
  const KS_DY_PLATFORMS=/https?:\/\/(www\.)?(douyin\.com|v\.douyin\.com|iesdouyin\.com|kuaishou\.com|gif\.kuaishou\.com|v\.kuaishou\.com)\//;
  if(KS_DY_PLATFORMS.test(v)){
    $('addBtn').disabled=true;$('addBtn').textContent='获取视频信息…';
    try{
      const res=await post('/api/add',{url});
      if(!res||res.ok===false){
        const errMsg=res?.error||'获取视频信息失败';
        const hint=res?.hint||'';
        await customAlert(errMsg+(hint?'\n\n'+hint:''),{title:'获取失败'});
        $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
        return;
      }
      showYtPreview(res);
    }catch(e){await customAlert('获取视频信息失败: '+e.message)}
    $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
    return;
  }

  // yt-dlp 支持的更多平台（微博/TikTok/Facebook/Spotify/网易/小红书/西瓜/芒果/腾讯）
  const YT_PLATFORMS=/https?:\/\/(www\.)?(weibo\.com|weibo\.cn|video\.weibo\.com|m\.weibo\.cn|share\.api\.weibo\.cn|tiktok\.com|vm\.tiktok\.com|vt\.tiktok\.com|facebook\.com|open\.spotify\.com|music\.163\.com|xiaohongshu\.com|xhslink\.com|ixigua\.com|mgtv\.com|m\.mgtv\.com|v\.qq\.com|film\.qq\.com|t\.cn)\//;
  if(YT_PLATFORMS.test(v)){
    $('addBtn').disabled=true;$('addBtn').textContent='获取视频信息…';
    try{
      const res=await post('/api/yt_info',{url});
      if(!res||res.ok===false){
        const errMsg=res?.error||'获取视频信息失败';
        const hint=res?.hint||'';
        await customAlert(errMsg+(hint?'\n\n'+hint:''),{title:'获取失败'});
        $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
        return;
      }
      showYtPreview(res);
    }catch(e){await customAlert('获取视频信息失败: '+e.message)}
    $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
    return;
  }

  // B站视频链接：使用B站API提取视频信息
  if(/https?:\/\/(www\.)?bilibili\.com\/(video|bangumi)\//.test(v)||/https?:\/\/b23\.tv\//.test(v)){
    $('addBtn').disabled=true;$('addBtn').textContent='解析B站视频…';
    try{
      const res=await post('/api/bili_info',{url});
      if(!res||res.ok===false){
        await customAlert(res?.error||'获取B站视频信息失败');
        $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
        return;
      }
      showBiliPreview(res,url);
    }catch(e){await customAlert('获取B站视频信息失败: '+e.message)}
    $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
    return;
  }

  // HTTP 网页链接：尝试提取视频
  if(v.startsWith('http')&&!isDirectFileDownload(v)){
    $('addBtn').disabled=true;$('addBtn').textContent='解析中…';
    try{
      // 直接视频链接 → 先预览确认，不自动下载
      if(/\.m3u8($|\?)/.test(v)||/\.(mp4|mkv|avi|mov|flv|webm|ts|m4v|wmv)($|\?)/.test(v)){
        const name=url.split('/').pop().split('?')[0]||'视频';
        showCxPreview({ok:true,title:name,m3u8_url:url,poster:'',magnet:'',type:'direct'});
        $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
        return;
      }
      // 网页链接：尝试通用视频提取
      const res=await post('/api/parse',{url});
      if(!res||res.ok===false){
        const errMsg=res?.error||'未解析出可下载内容';
        const hint=res?.hint||'';
        await customAlert(errMsg+(hint?'\n\n'+hint:''),{title:'解析失败'});
        $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
        return;
      }
      // yt-dlp fallback returns yt_media type — show YT preview card
      if(res.type==='yt_media'&&res.formats&&res.formats.length){
        showYtPreview(res);
      }else{
        showCxPreview(res);
      }
    }catch(e){await customAlert('解析失败: '+e.message)}
    $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
    return;
  }

  // ed2k 链接 → 搜索种子网络转换为磁力链接下载
  if(v.startsWith('ed2k')){
    $('addBtn').disabled=true;$('addBtn').textContent='搜索种子源…';
    try{
      const res=await post('/api/add',{url});
      if(!res||res.ok===false){
        // Copy file name to clipboard so user can search it manually
        const parsed=await post('/api/ed2k_parse',{url});
        if(parsed&&parsed.name){
          try{await navigator.clipboard.writeText(parsed.name)}catch(e){}
          await customAlert(res?.error||'未找到可下载的种子源','\n\n文件名已复制到剪贴板，可直接在浏览器搜索。');
        }else{
          await customAlert(res?.error||'未找到可下载的种子源');
        }
        $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
        return;
      }
      // Found a magnet link — show preview card (same as video/magnet preview)
      showCxPreview(res);
    }catch(e){await customAlert('搜索失败: '+e.message)}
    $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
    return;
  }

  // 非 HTTP 链接（magnet/ftp 等）→ 原有流程
  $('addBtn').disabled=true;$('addBtn').textContent='添加中…';
  try{
    const res=await post('/api/add',{url});
    if(!res||res.ok===false){await customAlert(res?.error||'添加失败，请检查链接或后端服务');$('addBtn').disabled=false;$('addBtn').textContent='添加下载';return}
    $('url').value='';$('typeHint').style.display='none';
    // Warn if files already exist
    if(res.existing_files&&res.existing_files.length>0){
      const names=res.existing_files.map(f=>f.name).join(', ');
      const ok=await customConfirm('已存在下载文件：'+names+'。\n\n是否覆盖已有文件重新下载？',{title:'重复下载',okText:'覆盖',danger:true});
      if(!ok){$('addBtn').disabled=false;$('addBtn').textContent='添加下载';return}
    }
    if(res.type==='torrent'){
      showFileModal(res.gid);
    } else {
      switchTab('tasks');
    }
  }catch(e){
    await customAlert('添加失败: '+e.message);
  }
  $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
};

// ---- 粘贴工具函数（Clipboard API → 后端系统剪贴板 → execCommand） ----
async function doPaste(){
  // 方案 A: 浏览器 Clipboard API
  try{
    const text=await navigator.clipboard.readText();
    if(text&&text.trim()) return text.trim();
  }catch(e){}
  // 方案 B: 后端系统剪贴板（独立应用 WKWebView）
  try{
    const r=await fetch('/api/clipboard');
    if(r.ok){const data=await r.json();if(data.text&&data.text.trim()) return data.text.trim()}
  }catch(e){}
  // 方案 C: contenteditable + execCommand('paste')
  return new Promise(resolve=>{
    const div=document.createElement('div');
    div.contentEditable='true';
    div.style.cssText='position:fixed;top:0;left:0;width:2px;height:2px;opacity:0;z-index:99999';
    document.body.appendChild(div);
    div.focus();
    let done=false;
    const finish=t=>{if(done)return;done=true;clearTimeout(timer);div.removeEventListener('paste',onPaste);try{document.body.removeChild(div)}catch(e){}resolve(t||'')};
    const onPaste=e=>{e.preventDefault();finish((e.clipboardData||window.clipboardData).getData('text'))};
    div.addEventListener('paste',onPaste);
    const timer=setTimeout(()=>{if(!document.execCommand('paste'))finish('')},50);
    setTimeout(()=>finish(''),2000);
  });
}

// ---- 剪贴板监听（仅自动粘贴到输入框，不自动下载） ----
(function(){
  let autoCooldown=false;
  window._clipLastText='';
  let lastDetectionTime=0;
  const LINK_RE=/^(magnet:|https?:\/\/|ftp:\/\/|sftp:\/\/|ed2k:\/\/|thunder:\/\/)|^(\/|~\/).*\.torrent$/i;  // also matches local .torrent file paths
  const CLIPBOARD_WINDOW_MS=30000;  // 30秒内复制的链接才响应

  function tryAutoPaste(text, force){
    if(!force&&autoCooldown)return;
    const t=(text||'').trim();
    if(!t||!LINK_RE.test(t))return;
    if(Object.keys(modalStates).length>0)return;
    // Don't block auto-paste when preview is showing — the add button
  // handler will auto-start the current download before processing new URL
    if($('confirmOverlay').style.display==='flex')return;
    if(document.activeElement===$('url')&&$('url').value===t)return;
    if(t===window._clipLastText)return;
    window._clipLastText=t;
    $('url').value=t;
    $('url').dispatchEvent(new Event('input'));
    $('url').focus();
    if(!force){autoCooldown=true;setTimeout(()=>{autoCooldown=false},3000)}
  }

  // 读取剪贴板：优先浏览器 API，回退后端系统命令
  async function readClipboard(){
    try{const t=await navigator.clipboard.readText();if(t)return t}catch(e){}
    try{const r=await fetch('/api/clipboard');if(r.ok){const d=await r.json();if(d.text)return d.text}}catch(e){}
    return '';
  }

  // 轮询剪贴板（独立应用 WKWebView 中 clipboard API 不可用）
  async function poll(){
    if(autoCooldown)return;
    try{
      const t=await readClipboard();
      if(t&&t.trim()!==window._clipLastText){lastDetectionTime=Date.now();tryAutoPaste(t)}
    }catch(e){}
  }
  // 启动后延迟 2 秒再开始轮询，不在启动时检查现有剪贴板
  setInterval(poll,2000);

  // 全局 paste 事件（用户主动粘贴，始终响应）
  document.addEventListener('paste',e=>{
    if(document.activeElement===$('url'))return;
    const text=(e.clipboardData||window.clipboardData).getData('text');
    lastDetectionTime=Date.now();
    tryAutoPaste(text,true);
  });

  // 窗口获得焦点时检查 —— 仅响应时间窗口内的剪贴板内容
  window.addEventListener('focus',async()=>{
    if(autoCooldown)return;
    try{
      const t=await readClipboard();
      if(!t||!t.trim())return;
      const elapsed=Date.now()-lastDetectionTime;
      if(elapsed<CLIPBOARD_WINDOW_MS)tryAutoPaste(t);
    }catch(e){}
  });
})();

function updateBiliFormats(data){

  fmtEl.innerHTML='';
  // Separate legacy (直链) and DASH formats for clear display
  const legacyFmts=fmts.filter(f=>f.is_legacy);
  const dashFmts=fmts.filter(f=>f.is_dash);

  // Show legacy formats (无需登录!)
  if(legacyFmts.length){
    const legacyGroup=document.createElement('div');
    legacyGroup.style.cssText='display:flex;flex-wrap:wrap;gap:4px;align-items:center';
    legacyGroup.innerHTML='<span style="font-size:11px;color:var(--accent2);margin-right:4px">✅ 无需登录：</span>';
    legacyFmts.forEach(f=>{
      const b=document.createElement('button');

      b.dataset.qid=f.quality_id;

        b.classList.add('primary');
      };
      legacyGroup.appendChild(b);
    });
    fmtEl.appendChild(legacyGroup);
  }
  // Show DASH formats (1080P+, needs login)
  if(dashFmts.length){
    const dashGroup=document.createElement('div');
    dashGroup.style.cssText='display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:4px';
    dashGroup.innerHTML='<span style="font-size:11px;color:var(--muted);margin-right:4px">🔒 登录后可用：</span>';
    dashFmts.forEach(f=>{
      const b=document.createElement('button');
      b.className='btn sm';
      b.textContent=f.label+(f.codec?' · '+f.codec:'')+(f.bandwidth?' · '+Math.round(f.bandwidth/1000)+'kbps':'');
      b.dataset.qid=f.quality_id;
      b.dataset.cid=f.codec_id;
      b.onclick=()=>{
        biliSelectedQuality=f.quality_id;
        biliSelectedCodec=f.codec_id;
        fmtEl.querySelectorAll('.btn.sm').forEach(x=>x.classList.remove('primary'));
        b.classList.add('primary');
      };
      dashGroup.appendChild(b);
    });
    fmtEl.appendChild(dashGroup);
  }
  // If no DASH formats available (not logged in), show hint for 1080P
  if(!dashFmts.length){
    const hint=document.createElement('div');
    hint.style.cssText='font-size:12px;color:var(--muted);margin-top:6px';
    hint.textContent='💡 扫码登录B站可获取1080P及以上画质';
    fmtEl.appendChild(hint);
  }
  // Auto-select best legacy format (720P 直链, no login needed!)
  if(legacyFmts.length){
    const best=legacyFmts[0];
    biliSelectedQuality=best.quality_id;
    biliSelectedCodec=best.codec_id||0;
    const bestBtn=fmtEl.querySelector('[data-qid="'+best.quality_id+'"][data-cid="'+(best.codec_id||0)+'"]');
    if(bestBtn)bestBtn.classList.add('primary');
  }else if(fmts.length){
    const best=fmts.find(f=>f.codec_id===7)||fmts[0];
    biliSelectedQuality=best.quality_id;
    biliSelectedCodec=best.codec_id;
    const bestBtn=fmtEl.querySelector('[data-qid="'+best.quality_id+'"][data-cid="'+best.codec_id+'"]');
    if(bestBtn)bestBtn.classList.add('primary');
  }

  // Audio formats
  const audioEl=$('biliAudioFormats');
  audioEl.innerHTML='';

    $('biliAudioSection').style.display='block';
    audioFmts.forEach(a=>{

      };
      audioEl.appendChild(b);

    const bestAudioBtn=audioEl.querySelector('[data-aid="'+bestAudio.audio_id+'"]');
    if(bestAudioBtn)bestAudioBtn.classList.add('primary');
  }else{
    $('biliAudioSection').style.display='none';
    biliSelectedAudio=audioFmts.length?audioFmts[0].audio_id:0;
  }

async function generateBiliQr(){
  if(biliQrTimer){clearInterval(biliQrTimer);biliQrTimer=null}

  $('biliQrStatus').textContent='正在生成二维码…';

    $('biliQrStatus').style.color='var(--text)';

    $('biliQrStatus').style.color='var(--danger)';
  }

// Render QR code from URL using canvas (uses qrcode-generator library)
function renderQrToCanvas(text){
  const canvas=document.createElement('canvas');
  const size=200;
  canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext('2d');
  try{
    const qr=qrcode(0,'M');
    qr.addData(text);
    qr.make();
    const modules=qr.getModuleCount();
    const cellSize=size/modules;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle='#000000';
    for(let r=0;r<modules;r++){
      for(let c=0;c<modules;c++){
        if(qr.isDark(r,c)){
          ctx.fillRect(c*cellSize,r*cellSize,cellSize,cellSize);
        }
      }
    }
    $('biliQrImg').src=canvas.toDataURL('image/png');
    $('biliQrImg').style.display='block';
  }catch(e){
    $('biliQrStatus').textContent='二维码生成失败';
    $('biliQrStatus').style.color='var(--danger)';
  }
}


async function pollBiliQr(){
  if(!biliQrKey)return;
  try{
    const res=await (await fetch('/api/bili_qr_poll?qrcode_key='+biliQrKey)).json();
    const code=res.code;
    if(code===0){
      // Login success!
      clearInterval(biliQrTimer);biliQrTimer=null;
      $('biliQrStatus').textContent='✅ 登录成功！';
      $('biliQrStatus').style.color='var(--accent2)';
      $('biliQrImage').style.display='none';
      // Auto-close after 1.5 seconds
      setTimeout(async ()=>{
        $('biliQrOverlay').style.display='none';
        checkBiliLogin();
        // Re-parse current video if showing
        if(biliData){
          const info=await post('/api/bili_info',{url:biliData.url||$('url').value});
          if(info&&info.ok)updateBiliFormats(info);
        }
      },1500);
    }else if(code===86101){
      $('biliQrStatus').textContent='等待扫码…';
      $('biliQrStatus').style.color='var(--muted)';
    }else if(code===86102){
      $('biliQrStatus').textContent='已扫码，请在手机上确认登录…';
      $('biliQrStatus').style.color='var(--accent)';
    }else{
      // Error or expired (86038)
      clearInterval(biliQrTimer);biliQrTimer=null;
      $('biliQrStatus').textContent=res.message||'二维码已过期，请刷新';
      $('biliQrStatus').style.color='var(--warn)';
    }
  }catch(e){
    clearInterval(biliQrTimer);biliQrTimer=null;
  }
}

// ---- file selection modal (multi, draggable, stackable) ----
const modalStates={};  // gid -> {overlay, timer, startTime}
const MAX_MODALS=3;

function closeModal(gid){
  const st=modalStates[gid];
  if(!st)return;
  if(st.timer){clearTimeout(st.timer);st.timer=null}
  if(st.overlay&&st.overlay.parentNode)st.overlay.parentNode.removeChild(st.overlay);
  delete modalStates[gid];
}
function cancelModal(gid, skipTrash){
  if(gid){post('/api/stop',{gid:gid,skip_trash:!!skipTrash})}
  closeModal(gid);
}

async function showFileModal(gid){
  // Limit concurrent modals
  const active=Object.keys(modalStates).length;
  if(active>=MAX_MODALS){await customAlert('已达到最大并行任务数('+MAX_MODALS+')，请先处理现有任务');return}

  const tmpl=document.getElementById('modalTemplate');
  const overlay=tmpl.content.firstElementChild.cloneNode(true);
  overlay.setAttribute('data-gid',gid);
  overlay.querySelector('.modal-title').textContent='新建BT任务';
  overlay.querySelector('.modal-body').innerHTML='<div class="info-text"><span class="spinner"></span>正在获取种子元数据…</div>';
  overlay.querySelector('.modal-foot').innerHTML='<button class="btn sm" onclick="cancelModal(\''+gid+'\',true)">取消</button>';

  // Drag support
  let dragging=false,dx=0,dy=0;
  const modal=overlay.querySelector('.modal');
  const handle=overlay.querySelector('.drag-handle');
  handle.addEventListener('mousedown',e=>{
    dragging=true;dx=e.clientX-modal.offsetLeft;dy=e.clientY-modal.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    modal.style.position='relative';
    modal.style.left=(e.clientX-dx)+'px';
    modal.style.top=(e.clientY-dy)+'px';
  });
  document.addEventListener('mouseup',()=>{dragging=false});

  document.getElementById('modalContainer').appendChild(overlay);
  modalStates[gid]={overlay, timer:null, startTime:Date.now()};
  pollModalFiles(gid);
}

function pollModalFiles(gid){
  const st=modalStates[gid];
  if(!st)return;
  st.timer=setTimeout(async()=>{
    if(!modalStates[gid])return;
    try{
      const s=await(await fetch('/api/status')).json();
      const t=(s.pending||[]).find(t=>t.gid===gid)||s.tasks.find(t=>t.gid===gid);
      if(t&&t.has_metadata&&t.files&&t.files.length>0){renderFilePicker(gid,t);return}
      const elapsed=Math.round((Date.now()-(st.startTime||Date.now()))/1000);
      // 90 秒超时：自动中止，跳过回收站，不保留磁盘文件
      if(elapsed>90){
        const st3=modalStates[gid];if(!st3)return;
        st3.overlay.querySelector('.modal-body').innerHTML='<div class="info-text" style="color:var(--danger)"><b>解析超时</b>（90 秒）<br><br>种子可能已失效或缺少做种者，请尝试其他链接。</div>';
        st3.overlay.querySelector('.modal-foot').innerHTML='<button class="btn sm" onclick="cancelModal(\''+gid+'\',true)">关闭</button>';
        return;
      }
      let info='<span class="spinner"></span>正在获取种子元数据…';
      if(t&&t.metadata_progress){info+='（'+t.metadata_progress+'%）'}
      info+='<br><span style="font-size:12px;opacity:.7">节点：'+(t?t.peers:0)+' · 用时 '+elapsed+' 秒</span>';
      if(elapsed>45){info+='<br><span style="font-size:12px;opacity:.6">种子可能缺少做种者，请耐心等待或尝试其他链接。</span>'}
      const st2=modalStates[gid];if(!st2)return;
      st2.overlay.querySelector('.modal-body').innerHTML='<div class="info-text">'+info+'</div>';
      pollModalFiles(gid);
    }catch(e){pollModalFiles(gid)}
  },1500);
}

function renderFilePicker(gid, t){
  const st=modalStates[gid];
  if(!st)return;
  if(st.timer){clearTimeout(st.timer);st.timer=null}
  const total=t.files.reduce((s,f)=>s+f.size,0);
  st.overlay.querySelector('.modal-title').textContent=t.name||'新建BT任务';
  // Build file type filter
  const cats=getFileCategories(t.files);
  let filterHtml='<div class="picker-toolbar">';
  filterHtml+='<div class="picker-filter">';
  filterHtml+='<span class="ftab active" data-cat="all">全部</span>';
  for(const [cat,info] of Object.entries(cats)){
    if(info.count>0)filterHtml+='<span class="ftab" data-cat="'+cat+'">'+info.label+'</span>';
  }
  filterHtml+='</div>';
  filterHtml+='<button class="btn sm" id="mSelAll_'+gid+'">全选</button>';
  filterHtml+='</div>';
  // File list
  let listHtml='<div class="picker-list" id="pickList_'+gid+'">';
  t.files.forEach(f=>{
    const cat=getFileCat(f.name);
    const icon=getFileIcon(cat);
    listHtml+='<div class="pick-row" data-cat="'+cat+'">'
      +'<input type="checkbox" class="check modal-check" data-i="'+f.index+'" checked>'
      +'<span class="pick-icon '+cat+'">'+icon+'</span>'
      +'<span class="fname" title="'+esc(f.name)+'">'+esc(f.name)+'</span>'
      +'<span class="fsize">'+fmtB(f.size)+'</span></div>';
  });
  listHtml+='</div>';
  // Summary
  let summaryHtml='<div class="picker-summary">';
  summaryHtml+='<span class="sel-info" id="pickSummary_'+gid+'">已选中 '+t.files.length+' 个文件，共 '+fmtB(total)+'</span>';
  summaryHtml+='<span class="disk-info" id="pickDisk_'+gid+'">保存至：'+(cur&&cur.settings?esc(cur.settings.save_path):'~/Downloads')+'</span>';
  summaryHtml+='</div>';
  // Actions
  let actionHtml='<div class="picker-actions">';
  actionHtml+='<button class="btn sm" onclick="cancelModal(\''+gid+'\',true)">取消</button>';
  actionHtml+='<button class="btn warn" id="mQueue_'+gid+'">添加到队列</button>';
  actionHtml+='<button class="btn go" id="mDownload_'+gid+'">立即下载</button>';
  actionHtml+='</div>';
  st.overlay.querySelector('.modal-body').innerHTML=filterHtml+listHtml+summaryHtml;
  st.overlay.querySelector('.modal-foot').innerHTML=actionHtml;
  // Bind events
  document.getElementById('mSelAll_'+gid).onclick=()=>{
    st.overlay.querySelectorAll('.modal-check').forEach(c=>c.checked=true);
    updatePickSummary(gid, t.files);
  };
  st.overlay.querySelectorAll('.modal-check').forEach(c=>c.addEventListener('change',()=>updatePickSummary(gid, t.files)));
  st.overlay.querySelectorAll('.ftab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      st.overlay.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      const cat=tab.dataset.cat;
      st.overlay.querySelectorAll('.pick-row').forEach(row=>{
        row.style.display=(cat==='all'||row.dataset.cat===cat)?'':'none';
      });
    });
  });
  document.getElementById('mQueue_'+gid).onclick=()=>confirmAdd(gid,'queue');
  document.getElementById('mDownload_'+gid).onclick=()=>confirmAdd(gid,'download');
}
function updatePickSummary(gid, files){
  const st=modalStates[gid];if(!st)return;
  const checks=st.overlay.querySelectorAll('.modal-check');
  let selCount=0,selSize=0;
  checks.forEach(c=>{
    if(c.checked){
      const idx=parseInt(c.dataset.i);
      if(files[idx]){selCount++;selSize+=files[idx].size;}
    }
  });
  const el=document.getElementById('pickSummary_'+gid);
  if(el)el.textContent='已选中 '+selCount+' 个文件，共 '+fmtB(selSize);
}
async function confirmAdd(gid, action){
  const st=modalStates[gid];if(!st)return;
  const idx=[...st.overlay.querySelectorAll('.modal-check')].filter(c=>c.checked).map(c=>+c.dataset.i);
  await post('/api/confirm',{gid,indices:idx,action});
  closeModal(gid);
  switchTab('tasks');
}

function renderTask(t){
  const el=document.createElement('div');el.className='task';
  const now=Date.now()/1000;
  const elapsed=t.added_at?Math.round(now-t.added_at):0;
  const timeInfo=(t.added_at&&(t.state==='downloading'||t.state==='fetching'||t.state==='queued'))?
    '<span>⏱ '+fmtTime(elapsed)+'</span>'+(t.progress>0?'<span>剩余 '+fmtETA(t.progress,elapsed)+'</span>':''):'';
  let html='<div class="top">'
    +'<span class="state-dot '+t.state+'"></span>'
    +'<span class="badge '+t.type+'">'+(TYPES[t.type]||t.type)+'</span>'
    +'<span class="name" title="'+esc(t.name)+'">'+esc(t.name)+'</span>'
    +'<span class="pill">'+(t.progress>0?t.progress.toFixed(0)+'%':t.size?fmtB(t.size):'--')+'</span>'
    +'</div>'
    +'<div class="meta">'
    +'<span>'+fmtB(t.size)+'</span>'
    +(t.completed_size>0&&t.state!=='finished'?'<span>'+fmtB(t.completed_size)+'</span>':'')
    +'<span style="display:inline-block;min-width:110px;font-variant-numeric:tabular-nums">'+fmtR(t.download_rate)+'</span>'
    +(t.type==='torrent'?'<span style="display:inline-block;min-width:110px;font-variant-numeric:tabular-nums">↑ '+fmtR(t.upload_rate)+'</span>':'')
    +timeInfo
    +(t.peers?'<span>'+t.peers+' 节点</span>':'')
    +'<span class="state-dot '+t.state+'"></span><span>'+({downloading:'下载中',paused:'已暂停',finished:'已完成',error:'错误',queued:'排队中',removed:'已移除',fetching:'获取中'})[t.state]||t.state+'</span>'
    +'</div>'
    +'<div class="bar"><i style="width:'+(t.progress||0)+'%"></i></div>';
  // Only show selected files, collapsed by default
  const selFiles=(t.files||[]).filter(f=>f.selected);
  const hasFiles=selFiles.length>0;
  if(hasFiles){
    const fid='flist_'+t.gid;
    html+='<div class="files-toggle" data-fid="'+fid+'"><span class="arrow">▶</span> '+selFiles.length+' 个文件</div>';
    html+='<div class="file-list-wrap" id="'+fid+'">';
    selFiles.forEach(f=>{
      html+='<div class="file-row">'
        +'<span style="width:18px"></span>'
        +'<span class="fname" title="'+esc(f.name)+'">'+esc(f.name)+'</span>'
        +'<span class="fmeta">'+fmtB(f.size)+'</span>'
        +'<span class="fbar"><i style="width:'+(f.progress||0)+'%"></i></span>'
        +'</div>';
    });
    html+='</div>';
  }
  html+='<div class="row" style="margin-top:10px">';
  if(t.state==='downloading'||t.state==='fetching'||t.state==='queued'){
    html+='<button class="btn sm warn" data-act="pause" data-g="'+t.gid+'">暂停</button>';
  }
  if(t.state==='paused'){
    html+='<button class="btn sm go" data-act="resume" data-g="'+t.gid+'">开始</button>';
  }
  if(t.state==='error'){
    html+='<button class="btn sm go" data-act="retry" data-g="'+t.gid+'">重试</button>';
  }
  html+='<button class="btn sm danger" data-act="stop" data-g="'+t.gid+'">删除</button>';
  html+='<button class="btn sm" data-act="openDir" data-g="'+t.gid+'" title="'+esc(t.dir||'')+'">📂</button></div>';
  el.innerHTML=html;
  el.querySelector('[data-act=pause]')?.addEventListener('click',()=>post('/api/pause',{gid:t.gid}));
  el.querySelector('[data-act=resume]')?.addEventListener('click',()=>post('/api/resume',{gid:t.gid}));
  el.querySelector('[data-act=retry]')?.addEventListener('click',()=>post('/api/retry',{gid:t.gid}));
  el.querySelector('[data-act=stop]')?.addEventListener('click',async()=>{if(await customConfirm('删除此任务？将移至回收站。',{danger:true}))await post('/api/stop',{gid:t.gid})});
  el.querySelector('[data-act=openDir]')?.addEventListener('click',()=>post('/api/open_folder',{path:t.dir||''}));
  // File list toggle
  el.querySelector('.files-toggle')?.addEventListener('click',function(){
    this.classList.toggle('open');
    const fid=this.dataset.fid;
    const wrap=document.getElementById(fid);
    if(wrap)wrap.classList.toggle('open');
    // Persist toggle state
    if(this.classList.contains('open'))openFiles.add(fid);else openFiles.delete(fid);
  });
  return el;
}

// File type helpers
function getFileCat(name){
  const n=name.toLowerCase();
  if(/\.(mp4|mkv|avi|mov|wmv|flv|webm|m4v|ts|m2ts)$/.test(n))return 'video';
  if(/\.(mp3|aac|flac|wav|ogg|wma|m4a|opus)$/.test(n))return 'audio';
  if(/\.(jpg|jpeg|png|gif|bmp|webp|svg|ico|tiff|psd)$/.test(n))return 'image';
  if(/\.(txt|md|pdf|doc|docx|ppt|pptx|xls|xlsx|csv|rtf|nfo|sfv)$/.test(n))return 'doc';
  if(/\.(srt|ass|ssa|sub|vtt|idx)$/.test(n))return 'doc';
  return 'other';
}
function getFileIcon(cat){
  const icons={video:'🎬',audio:'🎵',image:'🖼',doc:'📄',folder:'📁',other:'📦'};
  return icons[cat]||'📦';
}
function getFileCategories(files){
  const cats={};
  const labels={video:'视频',audio:'音乐',image:'图片',doc:'文档',other:'其他'};
  files.forEach(f=>{
    const cat=getFileCat(f.name);
    if(!cats[cat])cats[cat]={count:0,size:0,label:labels[cat]||cat};
    cats[cat].count++;cats[cat].size+=f.size;
  });
  return cats;
}
function updatePickSummary(files){
  const checks=document.querySelectorAll('.modal-check');
  let selCount=0,selSize=0;
  checks.forEach(c=>{
    if(c.checked){
      const idx=parseInt(c.dataset.i);
      if(files[idx]){selCount++;selSize+=files[idx].size;}
    }
  });
  const el=document.getElementById('pickSummary');
  if(el)el.textContent='已选中 '+selCount+' 个文件，共 '+fmtB(selSize);
}

    if(openFiles.has(fid)){ft.classList.add('open');const w=document.getElementById(fid);if(w)w.classList.add('open')}
  });
  $('clearTasks').style.display=(s.tasks.length&&activeTab==='tasks')?'block':'none';
  // Global button states
  if(s.tasks.length){
    const hasPaused=s.tasks.some(t=>t.state==='paused');
    const hasActive=s.tasks.some(t=>(t.state==='downloading'||t.state==='fetching'||t.state==='queued'));
    $('resumeAllBtn').disabled=!hasPaused;
    $('pauseAllBtn').disabled=!hasActive;
    $('deleteAllBtn').disabled=false;
  }
  $('cTasks').textContent=s.tasks.length;

  const hp=$('pane-history');hp.innerHTML='';
  if(!s.history.length){hp.appendChild(empty('暂无下载记录'))}
  else{s.history.forEach(r=>hp.appendChild(renderHistory(r)))}
  $('clearHist').style.display=(s.history.length&&activeTab==='history')?'block':'none';
  $('cHist').textContent=s.history.length;

  const rp=$('pane-trash');rp.innerHTML='';
  if(!s.trash.length){rp.appendChild(empty('回收站为空'))}
  else{s.trash.forEach(r=>rp.appendChild(renderTrash(r)))}
  $('clearTrash').style.display=(s.trash.length&&activeTab==='trash')?'block':'none';
  $('cTrash').textContent=s.trash.length;
}
poll();setInterval(poll,1500);
</script>
<div class="yt-float-stack" id="ytCardStack"></div>
</body>
</html>
