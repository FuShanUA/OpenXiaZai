<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下载器</title>
<style>
:root{
  --bg:#0e1014; --panel:#161a22; --panel2:#1c212b; --border:#282e3a;
  --text:#e6e8eb; --muted:#8b93a4; --accent:#4f9dff; --accent2:#34c759;
  --warn:#ffb020; --danger:#ff5c5c; --hover:#222734;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}
.wrap{max-width:920px;margin:0 auto;padding:24px 18px 60px}
header{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.logo{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,#4f9dff,#7b61ff);
  display:flex;align-items:center;justify-content:center;font-size:19px}
header h1{font-size:19px;font-weight:600;margin:0}
.sub{color:var(--muted);font-size:13px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--border);
  color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;outline:none}
input[type=text]:focus{border-color:var(--accent)}
.btn{border:1px solid var(--border);background:var(--panel2);color:var(--text);
  padding:9px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;
  display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn:hover{background:var(--hover)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#3d8bed}
.btn.go{background:var(--accent2);border-color:var(--accent2);color:#04150a}
.btn.warn{background:var(--warn);border-color:var(--warn);color:#2a1a00}
.btn.danger{border-color:#4a2a2a;color:var(--danger);background:transparent}
.btn.danger:hover{background:#2a1717}
.btn.sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.label{font-size:12px;color:var(--muted);min-width:90px}
.badge{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--panel2);
  border:1px solid var(--border);color:var(--accent)}
.badge.torrent{color:#c9a3ff}.badge.http{color:#4f9dff}.badge.ftp{color:#34c759}
.badge.unsup{color:var(--warn)}
.badge.m3u8{color:#ff5c5c}
.badge.direct{color:#ff5c5c}
/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;
  border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab .count{background:var(--panel2);border:1px solid var(--border);padding:1px 7px;
  border-radius:10px;font-size:11px;margin-left:5px}
/* settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.setting label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.setting input{padding:8px 10px}
.hint{font-size:12px;color:var(--muted);margin-top:8px}
/* task */
.task{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:10px}
.task .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.task .name{flex:1;min-width:0;font-weight:500;font-size:13px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.task .meta{display:flex;gap:10px;align-items:center;font-size:12px;color:var(--muted);margin-top:7px;flex-wrap:wrap}
.bar{height:6px;background:#1a1e28;border-radius:4px;overflow:hidden;margin-top:9px}
.bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}
.state-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block}
.state-dot.downloading,.state-dot.fetching{background:var(--accent);animation:pulse 1.2s infinite}
.state-dot.paused{background:var(--warn)}.state-dot.finished{background:var(--accent2)}
.state-dot.error{background:var(--danger)}.state-dot.queued{background:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.files{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.file-row{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:12px}
.file-row .fname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.file-row .fmeta{color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
.file-row .fbar{width:70px;height:4px;background:#1a1e28;border-radius:3px;overflow:hidden}
.file-row .fbar > i{display:block;height:100%;background:var(--accent)}
.files-toggle{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);cursor:pointer;user-select:none;padding:4px 0;margin-top:4px}
.files-toggle:hover{opacity:.8}
.files-toggle .arrow{transition:transform .2s;display:inline-block}
.files-toggle.open .arrow{transform:rotate(90deg)}
.file-list-wrap{display:none;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.file-list-wrap.open{display:block}
.check{appearance:none;width:18px;height:18px;border:2px solid var(--border);border-radius:5px;
  cursor:pointer;flex-shrink:0;position:relative;background:var(--panel);transition:.15s}
.check:checked{background:var(--accent);border-color:var(--accent)}
.check:checked::after{content:"";position:absolute;left:4px;width:6px;height:11px;
  border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);top:1px}
.empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}
.clear-bar{padding:8px 0;display:flex;gap:6px;flex-wrap:wrap}
code.dir{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#8ab4ff;word-break:break-all}
.rec{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--panel2);
  border:1px solid var(--border);border-radius:9px;margin-bottom:8px}
.rec .info{flex:1;min-width:0}
.rec .rname{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec .rsub{font-size:11px;color:var(--muted);margin-top:2px}
.pill{font-variant-numeric:tabular-nums;font-size:11px;color:var(--muted)}
/* modal */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;padding-top:28px;pointer-events:none}
.modal-overlay:nth-child(2){padding-top:48px}
.modal-overlay:nth-child(3){padding-top:68px}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:680px;max-width:94vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5);pointer-events:auto}
.modal-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:grab;user-select:none}
.modal-head:active{cursor:grabbing}
.modal-head h3{margin:0;font-size:15px;flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-body{padding:0 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column}
.modal-foot{border-top:1px solid var(--border);padding:0}
.drag-handle{cursor:grab}
.drag-handle:active{cursor:grabbing}
/* file picker */
.picker-toolbar{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.picker-filter{display:flex;gap:2px;flex-wrap:wrap}
.picker-filter .ftab{padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--muted);background:transparent;border:1px solid transparent;transition:.15s;user-select:none}
.picker-filter .ftab:hover{color:var(--text);background:var(--hover)}
.picker-filter .ftab.active{color:var(--accent);background:rgba(79,157,255,.1);border-color:var(--accent)}
.picker-list{flex:1;overflow-y:auto;min-height:140px;max-height:340px}
.pick-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--border);font-size:13px;transition:background .1s}
.pick-row:hover{background:var(--hover)}
.pick-row:last-child{border-bottom:none}
.pick-row .fname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pick-row .fsize{color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums;font-size:12px;min-width:70px;text-align:right}
.pick-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pick-icon.video{background:rgba(255,92,92,.15);color:#ff5c5c}
.pick-icon.audio{background:rgba(255,176,32,.15);color:#ffb020}
.pick-icon.image{background:rgba(52,199,89,.15);color:#34c759}
.pick-icon.doc{background:rgba(79,157,255,.15);color:#4f9dff}
.pick-icon.folder{background:rgba(201,163,255,.15);color:#c9a3ff}
.pick-icon.other{background:rgba(139,147,164,.15);color:#8b93a4}
.picker-summary{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);font-size:13px;flex-wrap:wrap;gap:8px}
.picker-summary .sel-info{color:var(--text);font-weight:500}
.picker-summary .disk-info{color:var(--muted);font-size:12px}
.picker-save{display:flex;align-items:center;gap:10px;padding:10px 0;font-size:13px;border-top:1px solid var(--border)}
.picker-save label{color:var(--muted);white-space:nowrap;font-size:12px}
.picker-save .dir-display{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#8ab4ff;background:var(--panel2);padding:6px 10px;border-radius:6px;border:1px solid var(--border)}
.picker-actions{display:flex;gap:10px;justify-content:flex-end;padding:14px 0}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.info-text{color:var(--muted);font-size:13px;text-align:center;padding:40px 10px}
/* 右键菜单 */
.ctx-menu{position:fixed;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:130px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.ctx-item{padding:8px 14px;cursor:pointer;border-radius:6px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;transition:background .1s;user-select:none}
.ctx-item:hover{background:var(--hover)}
.ctx-sep{height:1px;background:var(--border);margin:4px 8px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">⬇</div>
    <div><h1>下载器</h1><div class="sub">磁力 · 种子 · HTTP/HTTPS · FTP · 多任务</div></div>
  </header>

  <div class="card">
    <div class="row">
      <input type="text" id="url" placeholder="粘贴链接：magnet:、ed2k://、http(s)://、ftp://、夸克网盘…" style="flex:1">
      <button class="btn sm" id="pasteBtn" title="从剪贴板粘贴">📋</button>
      <button class="btn primary" id="addBtn">添加下载</button>
    </div>
    <div id="typeHint" class="hint" style="display:none"></div>
  </div>

  <!-- 视频提取预览卡片 -->
  <div class="card" id="cxPreview" style="display:none">
    <div class="row" style="align-items:flex-start">
      <img id="cxPoster" style="width:80px;height:110px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--panel2)" alt="">
      <div style="flex:1;min-width:0">
        <div id="cxTitle" style="font-weight:600;font-size:15px;margin-bottom:6px"></div>
        <div id="cxMagnet" style="font-size:11px;color:var(--muted);word-break:break-all;margin-bottom:4px;display:none"></div>
        <div id="cxM3u8" style="font-size:11px;color:var(--accent);word-break:break-all"></div>
      </div>
    </div>
    <div class="row" style="margin-top:12px;gap:8px">
      <button class="btn go" id="cxDownload">下载视频</button>
      <button class="btn" id="cxCancel">取消</button>
    </div>
  </div>

  <div class="card">
    <div class="settings-grid">
      <div class="setting">
        <label>并行任务数</label>
        <input type="text" id="maxActive" value="3">
      </div>
      <div class="setting">
        <label>每个任务下载线程</label>
        <input type="text" id="connections" value="16">
      </div>
      <div class="setting">
        <label>每个任务上传线程(BT)</label>
        <input type="text" id="uploads" value="4">
      </div>
    </div>
    <div class="row" style="margin-top:12px">
      <div style="flex:1">
        <div class="label" style="margin:0 0 5px 0">下载目录</div>
        <div class="row">
          <code class="dir" id="dest" style="flex:1;padding:10px 12px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;font-size:12px"></code>
          <button class="btn sm" id="chooseDir">选择目录</button>
        </div>
      </div>
      <button class="btn primary" id="applySettings" style="align-self:flex-end">保存设置</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="tasks">下载任务<span class="count" id="cTasks">0</span></div>
    <div class="tab" data-tab="history">下载记录<span class="count" id="cHist">0</span></div>
    <div class="tab" data-tab="trash">回收站<span class="count" id="cTrash">0</span></div>
  </div>

  <div id="pane-tasks"></div>
  <div id="pane-history" style="display:none"></div>
  <div id="pane-trash" style="display:none"></div>
  <div class="clear-bar" id="clearTasks" style="display:none"><button class="btn sm go" id="resumeAllBtn">开始全部任务</button><button class="btn sm danger" id="clearTasksBtn">停止全部任务</button></div>
  <div class="clear-bar" id="clearHist" style="display:none"><button class="btn sm danger" id="clearHistBtn">清空下载记录</button></div>
  <div class="clear-bar" id="clearTrash" style="display:none"><button class="btn sm danger" id="clearTrashBtn">清空回收站</button><button class="btn sm danger" id="clearTrashFilesBtn" style="margin-left:6px">清空回收站并删除文件</button></div>
</div>
<div id="modalContainer" style="position:fixed;inset:0;pointer-events:none;z-index:100"></div>
<!-- template for file picker modals -->
<template id="modalTemplate">
<div class="modal-overlay">
  <div class="modal" style="width:680px;max-width:94vw;max-height:85vh"><div class="modal-head drag-handle"><h3 class="modal-title"></h3><span class="pill modal-size"></span></div><div class="modal-body"></div><div class="modal-foot"></div></div>
</div>
</template>

<div class="modal-overlay" id="confirmOverlay" style="display:none">
  <div class="modal" style="width:420px">
    <div class="modal-head"><h3 id="confirmTitle">确认操作</h3></div>
    <div class="modal-body"><p id="confirmMsg" style="margin:8px 0;font-size:14px;line-height:1.6;white-space:pre-wrap"></p></div>
    <div class="modal-foot">
      <button class="btn" id="confirmNo">取消</button>
      <button class="btn primary" id="confirmOk">确定</button>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const TYPES={torrent:"种子/磁力",http:"HTTP 直链",ftp:"FTP",ed2k:"电驴",quark:"夸克网盘",cloud:"网盘",thunder:"迅雷",m3u8:"M3U8流媒体",direct:"视频直链"};
const UNSUP={ed2k:1,quark:1,cloud:1,thunder:1};
let activeTab='tasks';
let cur=null;
const openFiles=new Set();  // track which task file lists are expanded
const fmtB=b=>{if(!b)return '0 B';const u=['B','KB','MB','GB','TB'];let i=0,v=b;while(v>=1024&&i<u.length-1){v/=1024;i++}return v.toFixed(i?1:0)+' '+u[i]};
const fmtR=b=>b>0?'↓ '+fmtB(b)+'/s':'';
async function post(u,b){try{const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json()}catch(e){console.error('POST '+u+' failed:',e);return{ok:false,error:'请求失败: '+e.message}}}
function esc(s){return (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}


// in-app confirm/alert dialogs (avoids native OS dialog with Python icon)
function customConfirm(message, opts){
  opts=opts||{};
  return new Promise(resolve=>{
    $('confirmMsg').textContent=message;
    $('confirmTitle').textContent=opts.title||'确认操作';
    const okBtn=$('confirmOk'),noBtn=$('confirmNo');
    okBtn.textContent=opts.okText||'确定';
    noBtn.textContent=opts.cancelText||'取消';
    okBtn.className=opts.danger?'btn danger':'btn primary';
    noBtn.style.display='';
    $('confirmOverlay').style.display='flex';
    okBtn.onclick=()=>{$('confirmOverlay').style.display='none';resolve(true)};
    noBtn.onclick=()=>{$('confirmOverlay').style.display='none';resolve(false)};
  });
}
function customAlert(message, opts){
  opts=opts||{};
  return new Promise(resolve=>{
    $('confirmMsg').textContent=message;
    $('confirmTitle').textContent=opts.title||'提示';
    const okBtn=$('confirmOk'),noBtn=$('confirmNo');
    okBtn.textContent=opts.okText||'确定';
    okBtn.className='btn primary';
    noBtn.style.display='none';
    $('confirmOverlay').style.display='flex';
    okBtn.onclick=()=>{$('confirmOverlay').style.display='none';resolve(true)};
  });
}


// live link-type detection
$('url').addEventListener('input',()=>{
  const v=$('url').value.trim().toLowerCase();
  const h=$('typeHint');
  if(!v){h.style.display='none';return}
  let t='http';
  if(v.startsWith('magnet:'))t='torrent';
  else if(v.startsWith('ftp')||v.startsWith('sftp'))t='ftp';
  else if(v.startsWith('ed2k'))t='ed2k';
  else if(v.includes('quark.cn'))t='quark';
  else if(v.startsWith('thunder'))t='thunder';
  else if(/\.m3u8($|\?)/.test(v))t='m3u8';
  else if(/\.(mp4|mkv|avi|mov|flv|webm|ts|m4v|wmv)($|\?)/.test(v))t='direct';
  else if(v.startsWith('http'))t='http';
  h.style.display='block';
  h.innerHTML='识别为 <span class="badge '+(UNSUP[t]?'unsup':t)+'">'+TYPES[t]+'</span>'+(UNSUP[t]?' · 暂不支持直接下载':'');
});

// 判断 URL 是否为直接文件下载（不走视频提取）
function isDirectFileDownload(url){
  const dlExts=['.zip','.rar','.7z','.tar.gz','.tar.bz2','.tar.xz','.gz','.bz2',
    '.pdf','.dmg','.iso','.exe','.apk','.ipa','.deb','.rpm',
    '.doc','.docx','.xls','.xlsx','.ppt','.pptx',
    '.txt','.csv','.json','.xml','.html','.htm',
    '.jpg','.jpeg','.png','.gif','.webp','.svg','.ico',
    '.mp3','.flac','.wav','.aac','.ogg','.wma','.m4a',
    '.torrent','.css','.js','.py','.sh','.rb','.go','.java','.c','.cpp'];
  const ext=url.toLowerCase().split('?')[0].split('#')[0];
  return dlExts.some(e=>ext.endsWith(e));
}

$('addBtn').onclick=async()=>{
  const url=$('url').value.trim();
  if(!url){return}
  const v=url.toLowerCase();

  // HTTP 网页链接：尝试提取视频
  if(v.startsWith('http')&&!isDirectFileDownload(v)){
    // 直接视频链接 → 走 m3u8 下载
    if(/\.m3u8($|\?)/.test(v)||/\.(mp4|mkv|avi|mov|flv|webm|ts|m4v|wmv)($|\?)/.test(v)){
      $('addBtn').disabled=true;$('addBtn').textContent='添加中…';
      try{
        const name=url.split('/').pop().split('?')[0]||'视频';
        const res=await post('/api/download_m3u8',{url,title:name});
        if(!res||res.ok===false){await customAlert(res?.error||'添加失败');$('addBtn').disabled=false;$('addBtn').textContent='添加下载';return}
        $('url').value='';$('typeHint').style.display='none';
        switchTab('tasks');
      }catch(e){await customAlert('添加失败: '+e.message)}
      $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
      return;
    }

    // 网页链接：尝试通用视频提取
    $('addBtn').disabled=true;$('addBtn').textContent='解析中…';
    try{
      const res=await post('/api/parse',{url});
      if(!res||res.ok===false){
        await customAlert('未解析出可下载内容');
        $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
        return;
      }
      showCxPreview(res);
    }catch(e){await customAlert('解析失败: '+e.message)}
    $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
    return;
  }

  // 非 HTTP 链接（magnet/ed2k/ftp 等）→ 原有流程
  $('addBtn').disabled=true;$('addBtn').textContent='添加中…';
  try{
    const res=await post('/api/add',{url});
    if(!res||res.ok===false){await customAlert(res?.error||'添加失败，请检查链接或后端服务');$('addBtn').disabled=false;$('addBtn').textContent='添加下载';return}
    $('url').value='';$('typeHint').style.display='none';
    if(res.type==='torrent'){
      showFileModal(res.gid);
    } else {
      switchTab('tasks');
    }
  }catch(e){
    await customAlert('添加失败: '+e.message);
  }
  $('addBtn').disabled=false;$('addBtn').textContent='添加下载';
};

// ---- 粘贴工具函数 ----
async function doPaste(){
  // 优先用 Clipboard API
  try{
    const text=await navigator.clipboard.readText();
    if(text&&text.trim()) return text.trim();
  }catch(e){}
  // fallback: execCommand
  return new Promise(resolve=>{
    const prev=$('url').value;
    const handler=e=>{
      const text=(e.clipboardData||window.clipboardData).getData('text');
      $('url').removeEventListener('paste',handler);
      $('url').value=prev;
      resolve(text);
    };
    $('url').addEventListener('paste',handler);
    $('url').value='';
    $('url').focus();
    setTimeout(()=>{
      const ok=document.execCommand('paste');
      if(!ok){$('url').removeEventListener('paste',handler);$('url').value=prev;resolve('')}
    },50);
  });
}
async function pasteIntoInput(){
  const text=await doPaste();
  if(text){
    $('url').value=text;
    $('url').dispatchEvent(new Event('input'));
  }
  $('url').focus();
}

// ---- 剪贴板监听（基于 paste 事件 + window focus） ----
(function(){
  let autoCooldown=false;
  const LINK_RE=/^(magnet:|https?:\/\/|ftp:\/\/|sftp:\/\/|ed2k:\/\/|thunder:\/\/)/i;

  function tryAutoDownload(text){
    if(autoCooldown)return;
    const t=(text||'').trim();
    if(!t||!LINK_RE.test(t))return;
    if(Object.keys(modalStates).length>0)return;
    if($('cxPreview').style.display==='block')return;
    if($('confirmOverlay').style.display==='flex')return;
    // 如果当前正在输入框里编辑，不自动触发
    if(document.activeElement===$('url')&&$('url').value===t)return;
    $('url').value=t;
    $('url').dispatchEvent(new Event('input'));
    $('addBtn').click();
    autoCooldown=true;
    setTimeout(()=>{autoCooldown=false},3000);
  }

  // 全局 paste 事件：用户在任何地方 Ctrl+V / Cmd+V 时触发
  document.addEventListener('paste',e=>{
    // 如果焦点在输入框内，让输入框自己处理
    if(document.activeElement===$('url'))return;
    const text=(e.clipboardData||window.clipboardData).getData('text');
    tryAutoDownload(text);
  });

  // 窗口获得焦点时尝试读剪贴板
  window.addEventListener('focus',async()=>{
    if(autoCooldown)return;
    try{
      const text=await navigator.clipboard.readText();
      tryAutoDownload(text);
    }catch(e){}
  });
})();

// ---- file selection modal (multi, draggable, stackable) ----
const modalStates={};  // gid -> {overlay, timer, startTime}
const MAX_MODALS=3;

function closeModal(gid){
  const st=modalStates[gid];
  if(!st)return;
  if(st.timer){clearTimeout(st.timer);st.timer=null}
  if(st.overlay&&st.overlay.parentNode)st.overlay.parentNode.removeChild(st.overlay);
  delete modalStates[gid];
}
function cancelModal(gid){
  if(gid){post('/api/stop',{gid:gid})}
  closeModal(gid);
}

async function showFileModal(gid){
  // Limit concurrent modals
  const active=Object.keys(modalStates).length;
  if(active>=MAX_MODALS){await customAlert('已达到最大并行任务数('+MAX_MODALS+')，请先处理现有任务');return}

  const tmpl=document.getElementById('modalTemplate');
  const overlay=tmpl.content.firstElementChild.cloneNode(true);
  overlay.setAttribute('data-gid',gid);
  overlay.querySelector('.modal-title').textContent='新建BT任务';
  overlay.querySelector('.modal-body').innerHTML='<div class="info-text"><span class="spinner"></span>正在获取种子元数据…</div>';
  overlay.querySelector('.modal-foot').innerHTML='<button class="btn sm" onclick="cancelModal(\''+gid+'\')">取消</button>';

  // Drag support
  let dragging=false,dx=0,dy=0;
  const modal=overlay.querySelector('.modal');
  const handle=overlay.querySelector('.drag-handle');
  handle.addEventListener('mousedown',e=>{
    dragging=true;dx=e.clientX-modal.offsetLeft;dy=e.clientY-modal.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    modal.style.position='relative';
    modal.style.left=(e.clientX-dx)+'px';
    modal.style.top=(e.clientY-dy)+'px';
  });
  document.addEventListener('mouseup',()=>{dragging=false});

  document.getElementById('modalContainer').appendChild(overlay);
  modalStates[gid]={overlay, timer:null, startTime:Date.now()};
  pollModalFiles(gid);
}

function pollModalFiles(gid){
  const st=modalStates[gid];
  if(!st)return;
  st.timer=setTimeout(async()=>{
    if(!modalStates[gid])return;
    try{
      const s=await(await fetch('/api/status')).json();
      const t=(s.pending||[]).find(t=>t.gid===gid)||s.tasks.find(t=>t.gid===gid);
      if(t&&t.has_metadata&&t.files&&t.files.length>0){renderFilePicker(gid,t);return}
      const elapsed=Math.round((Date.now()-(st.startTime||Date.now()))/1000);
      let info='<span class="spinner"></span>正在获取种子元数据…';
      if(t&&t.metadata_progress){info+='（'+t.metadata_progress+'%）'}
      info+='<br><span style="font-size:12px;opacity:.7">节点：'+(t?t.peers:0)+' · 用时 '+elapsed+' 秒</span>';
      if(elapsed>45){info+='<br><span style="font-size:12px;opacity:.6">种子可能缺少做种者，请耐心等待或尝试其他链接。</span>'}
      const st2=modalStates[gid];if(!st2)return;
      st2.overlay.querySelector('.modal-body').innerHTML='<div class="info-text">'+info+'</div>';
      pollModalFiles(gid);
    }catch(e){pollModalFiles(gid)}
  },1500);
}

function renderFilePicker(gid, t){
  const st=modalStates[gid];

  if(st.timer){clearTimeout(st.timer);st.timer=null}
  const total=t.files.reduce((s,f)=>s+f.size,0);

  filterHtml+='<span class="ftab active" data-cat="all">全部</span>';
  for(const [cat,info] of Object.entries(cats)){
    if(info.count>0)filterHtml+='<span class="ftab" data-cat="'+cat+'">'+info.label+'</span>';
  }

  filterHtml+='</div>';
  // File list
  let listHtml='<div class="picker-list" id="pickList_'+gid+'">';
  t.files.forEach(f=>{
    const cat=getFileCat(f.name);

    listHtml+='<div class="pick-row" data-cat="'+cat+'">'
      +'<input type="checkbox" class="check modal-check" data-i="'+f.index+'" checked>'

  });
  listHtml+='</div>';
  // Summary

  summaryHtml+='<span class="sel-info" id="pickSummary_'+gid+'">已选中 '+t.files.length+' 个文件，共 '+fmtB(total)+'</span>';
  summaryHtml+='<span class="disk-info" id="pickDisk_'+gid+'">保存至：'+(cur&&cur.settings?esc(cur.settings.save_path):'~/Downloads')+'</span>';
  summaryHtml+='</div>';

  // Bind events
  document.getElementById('mSelAll_'+gid).onclick=()=>{
    st.overlay.querySelectorAll('.modal-check').forEach(c=>c.checked=true);

  };
  st.overlay.querySelectorAll('.modal-check').forEach(c=>c.addEventListener('change',()=>updatePickSummary(gid, t.files)));
  st.overlay.querySelectorAll('.ftab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      st.overlay.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');

        row.style.display=(cat==='all'||row.dataset.cat===cat)?'':'none';
      });
    });
  });
  document.getElementById('mQueue_'+gid).onclick=()=>confirmAdd(gid,'queue');
  document.getElementById('mDownload_'+gid).onclick=()=>confirmAdd(gid,'download');
}
function updatePickSummary(gid, files){
  const st=modalStates[gid];if(!st)return;

// File type helpers
function getFileCat(name){
  const n=name.toLowerCase();
  if(/\.(mp4|mkv|avi|mov|wmv|flv|webm|m4v|ts|m2ts)$/.test(n))return 'video';
  if(/\.(mp3|aac|flac|wav|ogg|wma|m4a|opus)$/.test(n))return 'audio';
  if(/\.(jpg|jpeg|png|gif|bmp|webp|svg|ico|tiff|psd)$/.test(n))return 'image';
  if(/\.(txt|md|pdf|doc|docx|ppt|pptx|xls|xlsx|csv|rtf|nfo|sfv)$/.test(n))return 'doc';
  if(/\.(srt|ass|ssa|sub|vtt|idx)$/.test(n))return 'doc';
  return 'other';
}
function getFileIcon(cat){
  const icons={video:'🎬',audio:'🎵',image:'🖼',doc:'📄',folder:'📁',other:'📦'};
  return icons[cat]||'📦';
}
function getFileCategories(files){
  const cats={};
  const labels={video:'视频',audio:'音乐',image:'图片',doc:'文档',other:'其他'};
  files.forEach(f=>{
    const cat=getFileCat(f.name);
    if(!cats[cat])cats[cat]={count:0,size:0,label:labels[cat]||cat};
    cats[cat].count++;cats[cat].size+=f.size;
  });
  return cats;
}

let lastTasks=[];
async function poll(){
  try{const r=await fetch('/api/status');if(!r.ok)throw new Error('HTTP '+r.status);const s=await r.json();cur=s;render(s)}catch(e){console.error('poll failed:',e)}
}
function render(s){
  $('maxActive').value=s.settings.max_active;
  $('connections').value=s.settings.connections;
  $('uploads').value=s.settings.uploads;
  $('dest').textContent=s.settings.save_path;
  const tp=$('pane-tasks');tp.innerHTML='';
  if(!s.tasks.length){tp.appendChild(empty('暂无下载任务。在上方粘贴链接开始。'))}
  else{s.tasks.forEach(t=>tp.appendChild(renderTask(t)))}
  // Restore open file lists
  document.querySelectorAll('.files-toggle').forEach(ft=>{
    const fid=ft.dataset.fid;
    if(openFiles.has(fid)){ft.classList.add('open');const w=document.getElementById(fid);if(w)w.classList.add('open')}
  });
  $('clearTasks').style.display=(s.tasks.length&&activeTab==='tasks')?'block':'none';
  $('cTasks').textContent=s.tasks.length;

  const hp=$('pane-history');hp.innerHTML='';
  if(!s.history.length){hp.appendChild(empty('暂无下载记录'))}
  else{s.history.forEach(r=>hp.appendChild(renderHistory(r)))}
  $('clearHist').style.display=(s.history.length&&activeTab==='history')?'block':'none';
  $('cHist').textContent=s.history.length;

  const rp=$('pane-trash');rp.innerHTML='';
  if(!s.trash.length){rp.appendChild(empty('回收站为空'))}
  else{s.trash.forEach(r=>rp.appendChild(renderTrash(r)))}
  $('clearTrash').style.display=(s.trash.length&&activeTab==='trash')?'block':'none';
  $('cTrash').textContent=s.trash.length;
}
poll();setInterval(poll,1500);
</script>
