name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download aria2c.exe
        shell: pwsh
        run: |
          $url = "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip"
          Invoke-WebRequest -Uri $url -OutFile aria2.zip
          Expand-Archive aria2.zip -DestinationPath aria2_tmp
          Copy-Item "aria2_tmp/aria2-1.37.0-win-64bit-build1/aria2c.exe" .
          Remove-Item -Recurse aria2.zip, aria2_tmp

      - name: Download ffmpeg.exe
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $exe = Get-ChildItem -Path ffmpeg_tmp -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          Copy-Item $exe.FullName .
          Remove-Item -Recurse ffmpeg.zip, ffmpeg_tmp

      - name: Build EXE
        run: python build.py win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenXiaZai-Windows
          path: dist/OpenXiaZai.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OpenXiaZai.exe
          name: OpenXiaZai ${{ github.ref_name }}
          generate_release_notes: true
